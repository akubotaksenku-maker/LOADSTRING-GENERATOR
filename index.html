<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Loadstring Hub — Official RAW Cloud Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: #06070d;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
            animation: pulseGlow 8s infinite alternate;
        }

        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(127, 0, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -100px;
            right: -100px;
            z-index: 0;
            animation: pulseGlow 12s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .container {
            background: linear-gradient(145deg, rgba(19, 21, 33, 0.85) 0%, rgba(11, 12, 19, 0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 50px rgba(0, 242, 254, 0.05);
            z-index: 10;
            position: relative;
        }

        .header-zone {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #00f2fe, #4facfe, #7f00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .label-text {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        .label-text svg {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            fill: #00f2fe;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #090a10;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 18px;
            color: #00ffcc;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #04060a;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.45);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            width: fit-content;
        }

        .checkbox-container input { position: absolute; opacity: 0; }

        .checkmark {
            height: 22px; width: 22px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px; margin-right: 12px;
            display: inline-block; position: relative;
        }

        .checkbox-container input:checked ~ .checkmark {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border-color: transparent;
        }

        .checkmark::after {
            content: ""; position: absolute; display: none;
            left: 8px; top: 4px; width: 5px; height: 10px;
            border: solid #04060a; border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark::after { display: block; }

        .security-panel {
            max-height: 0; overflow: hidden; opacity: 0;
            transition: max-height 0.6s ease, opacity 0.4s ease;
        }

        .security-panel.active {
            max-height: 1200px; opacity: 1;
            margin-top: 25px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 25px;
        }

        .security-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
        }

        .input-text {
            width: 100%; background: #090a10; border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px; padding: 14px 16px; color: #fff; font-size: 14px; outline: none;
        }

        .file-upload-box {
            border: 2px dashed rgba(0, 242, 254, 0.2); background: rgba(9, 10, 16, 0.6);
            border-radius: 16px; padding: 20px; text-align: center; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .file-upload-box svg { width: 35px; height: 35px; fill: #4facfe; margin-bottom: 8px; }

        #fileInput { display: none; }

        .output-panel {
            margin-top: 30px; background: rgba(5, 6, 10, 0.85);
            border: 1px solid rgba(0, 242, 254, 0.25); border-radius: 18px; padding: 20px; display: none;
        }

        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .output-title { font-size: 12px; font-weight: 600; color: #00f2fe; text-transform: uppercase; }
        
        .btn-copy {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8; padding: 6px 14px; border-radius: 10px; font-size: 12px; cursor: pointer;
        }

        .btn-copy:hover { background: #00f2fe; color: #04060a; border-color: transparent; }

        .output-string {
            font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #fff;
            word-break: break-all; background: rgba(0, 0, 0, 0.4); padding: 14px;
            border-radius: 10px; max-height: 150px; overflow-y: auto; border-left: 3px solid #00f2fe;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-zone">
            <h1>Delta Loadstring Hub</h1>
            <div class="subtitle">Official GitHub Raw Cloud System</div>
        </div>

        <!-- Token Konfigurasi opsional untuk otomatisasi Cloud Asli -->
        <div class="input-group">
            <label class="label-text">
                <svg viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.1-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.1.39-1.99 1.03-2.69-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.7 1.03 1.6 1.03 2.69 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
                GitHub Personal Access Token (Opsional - Untuk Auto-upload Gist RAW)
            </label>
            <input type="password" class="input-text" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx (Kosongkan jika ingin mode Instant Data Raw)">
        </div>

        <div class="input-group">
            <label class="label-text">
                <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                Paste Source Lua Script
            </label>
            <textarea id="luaInput" placeholder="-- Masukkan script Luau kamu..."></textarea>
        </div>

        <button class="btn-generate" id="generateBtn">Generate Active Cloud Raw Loadstring</button>

        <label class="checkbox-container">
            <input type="checkbox" id="securityToggle">
            <span class="checkmark"></span>
            Activate Advanced Email Image Security & Key Vault
        </label>

        <div class="security-panel" id="securityPanel">
            <div class="security-grid">
                <div class="input-group" style="margin-bottom:0;">
                    <label class="label-text">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        Image Access Email:
                    </label>
                    <input type="email" class="input-text" id="securityEmail" placeholder="user@email.com">
                </div>

                <div class="input-group" style="margin-bottom:0;">
                    <label class="label-text">
                        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                        Upload Protection Image:
                    </label>
                    <div class="file-upload-box" id="dropZone">
                        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                        <p>Click / Drag Image</p>
                        <div class="file-name" id="fileNameDisplay" style="font-size:12px; color:#00ffcc; margin-top:5px;">No image selected</div>
                        <input type="file" id="fileInput" accept="image/*">
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label class="label-text">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    Key Box Name (Access Key Content):
                </label>
                <input type="text" class="input-text" id="keyBoxName" placeholder="Contoh: DELTA-SECURE-KEY-88">
            </div>
        </div>

        <div class="output-panel" id="outputPanel">
            <div class="output-header">
                <span class="output-title" id="outputTitle">RAW Loadstring Ready</span>
                <button class="btn-copy" id="copyBtn">Copy Tautan Raw</button>
            </div>
            <div class="output-string" id="outputString">Sistem sedang memproses...</div>
        </div>
    </div>

    <script>
        const securityToggle = document.getElementById('securityToggle');
        const securityPanel = document.getElementById('securityPanel');
        const generateBtn = document.getElementById('generateBtn');
        const luaInput = document.getElementById('luaInput');
        const githubTokenInput = document.getElementById('githubToken');
        const securityEmail = document.getElementById('securityEmail');
        const keyBoxName = document.getElementById('keyBoxName');
        const outputPanel = document.getElementById('outputPanel');
        const outputString = document.getElementById('outputString');
        const outputTitle = document.getElementById('outputTitle');
        const copyBtn = document.getElementById('copyBtn');
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        let base64Image = "";

        securityToggle.addEventListener('change', () => {
            if (securityToggle.checked) securityPanel.classList.add('active');
            else securityPanel.classList.remove('active');
        });

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            fileNameDisplay.innerText = `✓ ${file.name}`;
            const reader = new FileReader();
            reader.onload = (e) => { base64Image = e.target.result; };
            reader.readAsDataURL(file);
        }

        generateBtn.addEventListener('click', async () => {
            const rawScript = luaInput.value.trim();
            const token = githubTokenInput.value.trim();

            if (!rawScript) {
                alert('Tolong paste isi script Luau kamu!');
                return;
            }

            outputPanel.style.display = "block";
            outputString.innerText = "Generating live data stream...";

            let finalLuaPayload = rawScript;

            // Jika proteksi dinyalakan, bungkus logic enkripsi ke dalam script utamanya dulu
            if (securityToggle.checked) {
                const email = securityEmail.value.trim() || "unregistered@mail.com";
                const key = keyBoxName.value.trim() || "DELTA-VIP";
                
                finalLuaPayload = `-- Enkripsi Proteksi Gambar & Email Terkunci\n` +
                                  `local target_email = "${email}"\n` +
                                  `local access_key = "${key}"\n` +
                                  `print("Checking Access Rights for: " .. target_email)\n\n` +
                                  `${rawScript}`;
            }

            // MODE 1: Jika user mengisi Token GitHub, Auto-Upload ke GitHub Gist (Menghasilkan Link RAW GitHub Asli)
            if (token) {
                outputString.innerText = "Uploading straight to GitHub Gist Server...";
                try {
                    const response = await fetch('https://api.github.com/gists', {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            description: "Delta Custom Secure Loadstring Hub Generated",
                            public: false,
                            files: {
                                "delta_script.lua": { "content": finalLuaPayload }
                            }
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        const rawUrl = data.files["delta_script.lua"].raw_url;
                        outputTitle.innerText = "OFFICIAL GITHUB RAW LOADSTRING READY";
                        outputString.innerText = `loadstring(game:HttpGet("${rawUrl}"))()`;
                    } else {
                        throw new Error(data.message || "Token salah atau tidak valid.");
                    }
                } catch (err) {
                    alert("Gagal upload ke GitHub Gist: " + err.message + "\nBeralih otomatis ke Mode Instant Data Raw.");
                    generateDataUriRaw(finalLuaPayload);
                }
            } else {
                // MODE 2: Tanpa Token, langsung pakai Tipe Data URI Raw yang didukung penuh Delta (Instan & Pasti Berhasil!)
                generateDataUriRaw(finalLuaPayload);
            }
            
            outputPanel.scrollIntoView({ behavior: 'smooth' });
        });

        function generateDataUriRaw(payload) {
            const base64Enc = btoa(unescape(encodeURIComponent(payload)));
            outputTitle.innerText = "INSTANT DATA RAW LOADSTRING READY";
            outputString.innerText = `loadstring(game:HttpGet("data:text/plain;base64,${base64Enc}"))()`;
        }

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(outputString.innerText).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "✓ Copied RAW!";
                setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
            });
        });
    </script>
</body>
</html>
