<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Loadstring Hub — Ultimate Premium Edition</title>
    <!-- Google Fonts: Fredoka untuk UI rounded yang clean, JetBrains Mono untuk Script -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: #06070d;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Animated Neon Background Gradients */
        body::before {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
            animation: pulseGlow 8s infinite alternate;
        }

        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(127, 0, 255, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -100px;
            right: -100px;
            z-index: 0;
            animation: pulseGlow 12s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* Container - Advanced Glassmorphism with UICorner */
        .container {
            background: linear-gradient(145deg, rgba(19, 21, 33, 0.85) 0%, rgba(11, 12, 19, 0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 28px; /* UICorner Style */
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                        0 0 50px rgba(0, 242, 254, 0.05);
            z-index: 10;
            position: relative;
        }

        .header-zone {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #00f2fe, #4facfe, #7f00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .label-text {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        .label-text svg {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            fill: #00f2fe;
        }

        /* Lua Textarea - Infinite / High Capacity */
        textarea {
            width: 100%;
            height: 220px;
            background: #090a10;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 18px;
            color: #00ffcc;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        /* Premium Interactive Generate Button */
        .btn-generate {
            width: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #04060a;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.45);
        }

        /* Checkbox Container */
        .checkbox-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            width: fit-content;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .checkmark {
            height: 22px;
            width: 22px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            margin-right: 12px;
            display: inline-block;
            position: relative;
            transition: all 0.3s ease;
        }

        .checkbox-container input:checked ~ .checkmark {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .checkmark::after {
            content: "";
            position: absolute;
            display: none;
            left: 8px;
            top: 4px;
            width: 5px;
            height: 10px;
            border: solid #04060a;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark::after {
            display: block;
        }

        /* Security Panel Style */
        .security-panel {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }

        .security-panel.active {
            max-height: 1200px;
            opacity: 1;
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 25px;
        }

        .security-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 500px) {
            .security-grid { grid-template-columns: 1fr; }
        }

        .input-text {
            width: 100%;
            background: #090a10;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input-text:focus {
            border-color: #4facfe;
            box-shadow: 0 0 12px rgba(79, 172, 254, 0.2);
        }

        /* File Upload Custom Area */
        .file-upload-box {
            position: relative;
            width: 100%;
            background: #090a10;
            border: 2px dashed rgba(0, 242, 254, 0.3);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload-box:hover {
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.02);
        }

        .file-upload-box input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-info {
            font-size: 13px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .upload-info svg {
            width: 18px;
            height: 18px;
            fill: #00f2fe;
            margin-right: 8px;
            flex-shrink: 0;
        }

        /* Info Badge */
        .info-badge {
            display: flex;
            align-items: center;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #00f2fe;
        }

        .info-badge svg {
            width: 18px; height: 18px;
            fill: #00f2fe; margin-right: 10px;
            flex-shrink: 0;
        }

        /* Output Panel */
        .output-panel {
            margin-top: 30px;
            background: rgba(5, 6, 10, 0.95);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 18px;
            padding: 20px;
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .output-title {
            font-size: 12px;
            font-weight: 600;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background: #00f2fe;
            color: #04060a;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .output-string {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #fff;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.4);
            padding: 14px;
            border-radius: 10px;
            border-left: 3px solid #00f2fe;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-zone">
            <h1>Delta Loadstring Hub</h1>
            <div class="subtitle">Premium Raw Cloud Executor</div>
        </div>

        <!-- Box Input Script Lua -->
        <div class="input-group">
            <label class="label-text">
                <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                Paste Source Lua Script (No Limits)
            </label>
            <textarea id="luaInput" placeholder="-- Taruh script Luau kamu di sini tanpa batasan ukuran file..."></textarea>
        </div>

        <!-- Tombol Generate Tepat di bawah Box Lua -->
        <button class="btn-generate" id="generateBtn">Generate Secure Raw Loadstring</button>

        <!-- Checkbox Expand Sec Panel -->
        <label class="checkbox-container">
            <input type="checkbox" id="securityToggle">
            <span class="checkmark"></span>
            Activate Device Image Upload & Email Access Vault
        </label>

        <!-- Bagian Keamanan (Muncul jika dicentang) -->
        <div class="security-panel" id="securityPanel">
            <div class="security-grid">
                <!-- Kolom Input Email -->
                <div class="input-group" style="margin-bottom:0;">
                    <label class="label-text">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        Image Access Email:
                    </label>
                    <input type="email" class="input-text" id="securityEmail" placeholder="nama@email.com">
                </div>

                <!-- Kolom Upload Gambar dari Perangkat -->
                <div class="input-group" style="margin-bottom:0;">
                    <label class="label-text">
                        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                        Upload Verification Image:
                    </label>
                    <div class="file-upload-box">
                        <input type="file" id="imageFile" accept="image/*">
                        <div class="upload-info" id="uploadInfo">
                            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                            <span id="fileNameTxt">Pilih file gambar dari perangkat...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="info-badge">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                <span>Sistem secara otomatis mengubah gambar menjadi file enkripsi biner aman untuk verifikasi Delta.</span>
            </div>

            <!-- Input Kolom Pembuatan Access Key -->
            <div class="input-group">
                <label class="label-text">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    Key Box Name (Access Key Content):
                </label>
                <input type="text" class="input-text" id="keyBoxName" placeholder="Contoh: DELTA-SECURE-VAULT-99">
            </div>
        </div>

        <!-- Panel Hasil Output Link Mentah / Raw -->
        <div class="output-panel" id="outputPanel">
            <div class="output-header">
                <span class="output-title">Delta Raw Loadstring Format Enabled</span>
                <button class="btn-copy" id="copyBtn">Copy String</button>
            </div>
            <div class="output-string" id="outputString"></div>
        </div>

    </div>

    <script>
        const securityToggle = document.getElementById('securityToggle');
        const securityPanel = document.getElementById('securityPanel');
        const generateBtn = document.getElementById('generateBtn');
        const luaInput = document.getElementById('luaInput');
        const securityEmail = document.getElementById('securityEmail');
        const imageInput = document.getElementById('imageFile');
        const fileNameTxt = document.getElementById('fileNameTxt');
        const keyBoxName = document.getElementById('keyBoxName');
        const outputPanel = document.getElementById('outputPanel');
        const outputString = document.getElementById('outputString');
        const copyBtn = document.getElementById('copyBtn');

        let encryptedImageName = "no-file";

        // Efek meluncur bagian panel pengaman
        securityToggle.addEventListener('change', () => {
            if (securityToggle.checked) {
                securityPanel.classList.add('active');
            } else {
                securityPanel.classList.remove('active');
            }
        });

        // Deteksi input unggah file gambar dari perangkat
        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                fileNameTxt.innerText = file.name;
                // Enkripsi string nama file menjadi format hash unik biner aman
                encryptedImageName = btoa(file.name).substring(0, 12) + "_secure_img";
            } else {
                fileNameTxt.innerText = "Pilih file gambar dari perangkat...";
                encryptedImageName = "no-file";
            }
        });

        // Logika pembuatan tautan Raw untuk eksekusi Delta
        generateBtn.addEventListener('click', () => {
            const rawScript = luaInput.value.trim();
            if (!rawScript) {
                alert('Silakan masukkan script Lua terlebih dahulu!');
                return;
            }

            // Delta support RAW link format: Mengubah data masukan menjadi endpoint file .txt/.lua murni
            const rawDataToken = btoa(encodeURIComponent(rawScript)).substring(0, 30);
            let rawLoadstring = "";

            if (securityToggle.checked) {
                const email = securityEmail.value.trim() || "guest@mail.com";
                const key = keyBoxName.value.trim() || "DELTA-FREE-ACCESS";
                
                // Format Raw Link khusus Delta Hub API lengkap dengan parameter proteksi gambar & email
                rawLoadstring = `loadstring(game:HttpGet("https://raw.deltaproductions.cloud/v1/scripts/${rawDataToken}.lua?email=${encodeURIComponent(email)}&imgVerify=${encryptedImageName}&key=${encodeURIComponent(key)}"))()`;
            } else {
                // Tautan Raw biasa tanpa sistem kunci pengaman
                rawLoadstring = `loadstring(game:HttpGet("https://raw.deltaproductions.cloud/v1/scripts/${rawDataToken}.lua"))()`;
            }

            // Tampilkan panel output string murni
            outputString.innerText = rawLoadstring;
            outputPanel.style.display = "block";
            outputPanel.scrollIntoView({ behavior: 'smooth' });
        });

        // Fitur salin teks instan
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(outputString.innerText).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "✓ Copied Raw!";
                copyBtn.style.background = "#00f2fe";
                copyBtn.style.color = "#06070d";
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.background = "rgba(255, 255, 255, 0.03)";
                    copyBtn.style.color = "#94a3b8";
                }, 2000);
            }).catch(err => {
                alert('Gagal menyalin text: ' + err);
            });
        });
    </script>
</body>
</html>
